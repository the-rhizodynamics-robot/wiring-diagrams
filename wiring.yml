# WireViz source for the example GROOT robot's wiring.
#
# Render:  pip install wireviz   (also needs Graphviz `dot` on PATH)
#          wireviz wiring.yml     ->  wiring.svg + wiring.png + wiring.bom.tsv
# Commit the generated wiring.svg next to this file so it renders on GitHub.
#
# SCOPE: the Arduino control signals (from the firmware pin map) PLUS the stepper
# power subsystem (24 V PSU -> DQ542MA drivers -> motors), documented from photos of
# the rig. The 5 V logic (Mega + sensors + relay logic/coil) is powered from the host PC
# over USB — a separate domain from the 24 V motor/LED bus, bridged only by the drivers'
# input optocouplers. Camera trigger confirmed: D12 + Mega GND direct to the camera (shared
# logic ground). Still TODO: the photointerrupter module part/pin-order and the capture-software
# switch (Blackfly S = Spinnaker, not the legacy FlyCapture — see robot-control/file-sorting).
#
# Verified against robot-control firmware (robot_device_serial.ino): pins D5/D7/D6 (X)
# and D8/D10/D9 (Y) match; the common-cathode wiring realizes the firmware's active-LOW
# enable (D6/D9 LOW -> ENA opto off -> driver enabled).

connectors:
  MEGA:
    type: Arduino Mega 2560
    pinlabels: [D5, D7, D6, D8, D10, D9, D3, D2, D12, D23, D25, D27, D29, D31, D33, 5V, GND]
    notes: >-
      Powered from the host PC over USB; its 5 V pin feeds the photointerrupters and the
      relay board (logic + coil). The Mega never touches the 24 V bus — the logic and 24 V
      power grounds are separate domains, bridged only by the drivers' input optocouplers.

  PSU:
    type: Mean-Well-style SMPS S-360-24
    pinlabels: [V+, V-]
    notes: AC 110/220 V in; DC out 24 V / 15 A (360 W). Feeds both driver DC buses.

  FUSE_X:
    type: Fuse 5 A fast-blow (inline holder)
    pinlabels: [in, out]
    notes: >-
      On the +24 V leg to the X driver, close to the PSU. Upsized fast-blow so the
      driver's millisecond cap-inrush doesn't nuisance-trip; a hard short still pulls
      15 A+ off the PSU and clears. Returns (V-) are unfused.

  FUSE_Y:
    type: Fuse 7.5 A fast-blow (inline holder)
    pinlabels: [in, out]
    notes: >-
      On the +24 V leg to the Y driver. Larger than X because the Y driver runs two
      motors in parallel (~2x current). Fast-blow upsized for inrush, as with X.

  FUSE_LED:
    type: Fuse — size to LED load, fast-blow (inline holder)
    pinlabels: [in, out]
    notes: >-
      On the +24 V leg feeding the shelf-LED relay contacts. Amps = total LED watts /
      24 V, next standard size up, kept below the relay's contact rating. LED load
      wattage still TBD (see hardware-open-questions.md).

  XDRV:
    type: Stepper driver — X / horizontal (Wantai DQ542MA)
    pinlabels: [PUL+, PUL-, DIR+, DIR-, ENBL+, ENBL-, DC+, DC-, A+, A-, B+, B-]
    notes: >-
      18-50 VDC. Common-cathode signal: Mega D5/D7/D6 drive PUL+/DIR+/ENBL+;
      PUL-/DIR-/ENBL- jumpered to Mega GND. DIP SW1-8 = ON OFF ON OFF ON OFF OFF ON:
      128 microstep (25600 pulse/rev), 1.92 A peak / 1.36 A RMS, SW4 OFF = half
      current at standstill. EN active-LOW (firmware).

  YDRV:
    type: Stepper driver — Y / vertical (Wantai DQ542MA)
    pinlabels: [PUL+, PUL-, DIR+, DIR-, ENBL+, ENBL-, DC+, DC-, A+, A-, B+, B-]
    notes: >-
      18-50 VDC. Common-cathode signal: Mega D8/D10/D9 drive PUL+/DIR+/ENBL+;
      PUL-/DIR-/ENBL- jumpered to Mega GND. DIP SW1-8 = ON OFF OFF OFF ON OFF OFF ON:
      128 microstep (25600 pulse/rev), 3.76 A peak / 2.69 A RMS, SW4 OFF = half
      current. Higher current because it drives TWO motors in parallel (~1.88 A
      each). EN active-LOW (firmware).

  MOTOR_X:
    type: NEMA 17 stepper — X / horizontal
    pinlabels: [A+, A-, B+, B-]
    notes: >-
      StepperOnline NEMA 17, 2.0 A/phase, 59 Ncm (84 oz-in), 48 mm, 4-lead
      (17HS19-2004S1). Coil A = A+ black / A- green; coil B = B+ red / B- blue.
      Drives the camera carriage. (+/- order only affects direction.)

  MOTOR_Y1:
    type: NEMA 17 stepper — Y / vertical (1 of 2)
    pinlabels: [A+, A-, B+, B-]
    notes: >-
      StepperOnline NEMA 17 2.0 A/phase (17HS19-2004S1), GT2 belt. Coil A =
      A+ black / A- green; coil B = B+ red / B- blue.

  MOTOR_Y2:
    type: NEMA 17 stepper — Y / vertical (2 of 2)
    pinlabels: [A+, A-, B+, B-]
    notes: >-
      Second vertical motor, wired in PARALLEL with Y1 on the YDRV outputs (both
      step together; that's why YDRV current is set ~2x). Same NEMA 17 / colors.

  PIX_H:
    type: Photointerrupter — horizontal home
    pinlabels: [VCC, GND, OUT]
    notes: >-
      3-wire to the Mega: VCC<-5V, GND<-GND, OUT->D3 (operator-confirmed). INPUT_PULLUP;
      OUT reads LOW when the slot is blocked. Module part / connector pin-order TBD.

  PIX_V:
    type: Photointerrupter — vertical home
    pinlabels: [VCC, GND, OUT]
    notes: >-
      Mirrors PIX_H on D2: VCC<-5V, GND<-GND, OUT->D2 (firmware). INPUT_PULLUP; OUT reads
      LOW when the slot is blocked. Module part / connector pin-order TBD.

  CAM:
    type: Camera trigger input (FLIR)
    pinlabels: [TRIG, GND]
    notes: >-
      TRIG <- Mega D12, GND <- Mega GND — direct logic connection, no level-shift/opto on the
      Arduino side, so the camera shares the logic ground (operator-confirmed working). Firmware
      sends a ~50 ms HIGH pulse (shorter is ignored). Which Blackfly GPIO line D12 lands on: TBD.

  RELAYS:
    type: 6-ch relay board — shelf lights
    pinlabels: [IN1, IN2, IN3, IN4, IN5, IN6, VCC, GND, COM+, LEDout]
    notes: >-
      Logic side: active-LOW; IN1 = shelf 1 … IN6 = shelf 6. VCC + coil supply (JD-VCC)
      both off the Mega's USB-fed 5 V (VCC↔JD-VCC jumper in place). Contact side: in THIS
      rig a SINGLE relay channel switches
      ALL the LEDs at once — every shelf's string is paralleled on a terminal block, so
      all lights go on/off together — even though the board has 6 channels and the
      firmware drives 6 relay pins (a build-specific simplification). COM+ = fused +24 V
      into that channel's common; LEDout = its switched output to the LED terminal block.

  TB_LED:
    type: Terminal block — LED distribution
    pinlabels: [in, out]
    notes: >-
      Every shelf's LED string lands here in PARALLEL off the one relay's switched +24 V,
      so a single relay turns all the lights on/off together (this rig).

  LEDS:
    type: 24 V shelf LEDs (all paralleled)
    pinlabels: [V+, V-]
    notes: >-
      All shelves' 24 V LED strings, paralleled on the terminal block and switched
      together by the single relay channel. Total LED wattage TBD — it sets the
      FUSE_LED rating (see hardware-open-questions.md).

cables:
  WSX:                       # X signals (common-cathode): 3 signals + GND return
    colors: [GN, YE, OG, BK]
  WSY:
    colors: [GN, YE, OG, BK]
  WPXv:                      # X: PSU V+ -> FUSE_X
    colors: [RD]
  WPXf:                      # X: FUSE_X -> driver DC+
    colors: [RD]
  WPXn:                      # X: PSU V- -> driver DC- (unfused return)
    colors: [BK]
  WPYv:                      # Y: PSU V+ -> FUSE_Y
    colors: [RD]
  WPYf:                      # Y: FUSE_Y -> driver DC+
    colors: [RD]
  WPYn:                      # Y: PSU V- -> driver DC- (unfused return)
    colors: [BK]
  WLEDv:                     # LED: PSU V+ -> FUSE_LED
    colors: [RD]
  WLEDf:                     # LED: FUSE_LED -> relay COM+
    colors: [RD]
  WLEDo:                     # LED: relay LEDout -> terminal block
    colors: [RD]
  WLEDp:                     # LED: terminal block -> paralleled LED strings
    colors: [RD]
  WLEDn:                     # LED: LED strings V- -> PSU V- (unfused return)
    colors: [BK]
  WMX:                       # X motor coils (StepperOnline color code)
    colors: [BK, GN, RD, BU]
  WMY1:                      # Y motor 1 coils
    colors: [BK, GN, RD, BU]
  WMY2:                      # Y motor 2 coils (parallel)
    colors: [BK, GN, RD, BU]
  WPH:
    colors: [RD, BK, WH]
  WPV:
    colors: [RD, BK, WH]
  WCAM:
    colors: [VT, BK]
  WREL:
    colors: [BN, RD, OG, YE, GN, BU, WH, BK]

connections:
  -                                   # X stepper signals (common-cathode)
    - MEGA: [D5, D7, D6, GND]
    - WSX: [1, 2, 3, 4]
    - XDRV: [PUL+, DIR+, ENBL+, ENBL-]
  -                                   # Y stepper signals (common-cathode)
    - MEGA: [D8, D10, D9, GND]
    - WSY: [1, 2, 3, 4]
    - YDRV: [PUL+, DIR+, ENBL+, ENBL-]
  -                                   # X driver +24 V through inline fuse
    - PSU: [V+]
    - WPXv: [1]
    - FUSE_X: [in]
  -
    - FUSE_X: [out]
    - WPXf: [1]
    - XDRV: [DC+]
  -                                   # X driver return (unfused)
    - PSU: [V-]
    - WPXn: [1]
    - XDRV: [DC-]
  -                                   # Y driver +24 V through inline fuse
    - PSU: [V+]
    - WPYv: [1]
    - FUSE_Y: [in]
  -
    - FUSE_Y: [out]
    - WPYf: [1]
    - YDRV: [DC+]
  -                                   # Y driver return (unfused)
    - PSU: [V-]
    - WPYn: [1]
    - YDRV: [DC-]
  -                                   # X motor coils
    - XDRV: [A+, A-, B+, B-]
    - WMX: [1, 2, 3, 4]
    - MOTOR_X: [A+, A-, B+, B-]
  -                                   # Y motor 1 coils
    - YDRV: [A+, A-, B+, B-]
    - WMY1: [1, 2, 3, 4]
    - MOTOR_Y1: [A+, A-, B+, B-]
  -                                   # Y motor 2 coils (parallel with motor 1)
    - YDRV: [A+, A-, B+, B-]
    - WMY2: [1, 2, 3, 4]
    - MOTOR_Y2: [A+, A-, B+, B-]
  -                                   # horizontal home photointerrupter
    - MEGA: [5V, GND, D3]
    - WPH: [1, 2, 3]
    - PIX_H: [VCC, GND, OUT]
  -                                   # vertical home photointerrupter
    - MEGA: [5V, GND, D2]
    - WPV: [1, 2, 3]
    - PIX_V: [VCC, GND, OUT]
  -                                   # camera trigger
    - MEGA: [D12, GND]
    - WCAM: [1, 2]
    - CAM: [TRIG, GND]
  -                                   # shelf-light relays (logic side)
    - MEGA: [D23, D25, D27, D29, D31, D33, 5V, GND]
    - WREL: [1, 2, 3, 4, 5, 6, 7, 8]
    - RELAYS: [IN1, IN2, IN3, IN4, IN5, IN6, VCC, GND]
  -                                   # LED power: +24 V through inline fuse to relay contacts
    - PSU: [V+]
    - WLEDv: [1]
    - FUSE_LED: [in]
  -
    - FUSE_LED: [out]
    - WLEDf: [1]
    - RELAYS: [COM+]
  -                                   # relay switched output -> LED distribution terminal block
    - RELAYS: [LEDout]
    - WLEDo: [1]
    - TB_LED: [in]
  -                                   # terminal block -> all shelf LED strings (paralleled)
    - TB_LED: [out]
    - WLEDp: [1]
    - LEDS: [V+]
  -                                   # LED return (unfused)
    - LEDS: [V-]
    - WLEDn: [1]
    - PSU: [V-]

# DQ542MA signal side is common-cathode: the Mega's 5 V step/dir/enable outputs drive
# the PUL+/DIR+/ENBL+ inputs, and PUL-/DIR-/ENBL- are jumpered to the Mega GND wire
# (WSX/WSY pin 4). DIP: both axes 128 microstep (25600 pulse/rev), SW4 OFF = half
# current at standstill; current X = 1.92 A peak (1.36 RMS), Y = 3.76 A peak (2.69 RMS,
# split across the two parallel vertical motors).
