# WireViz source for the example GROOT robot's wiring.
#
# Render:  pip install wireviz   (also needs Graphviz `dot` on PATH)
#          wireviz wiring.yml     ->  wiring.svg + wiring.png + wiring.bom.tsv
# Commit the generated wiring.svg next to this file so it renders on GitHub.
#
# SCOPE: the Arduino control signals (from the firmware pin map) PLUS the stepper
# power subsystem (24 V PSU -> DQ542MA drivers -> motors), documented from photos of
# the rig. Still TODO: the 5 V logic source for the Mega/sensors/relay logic, the
# relay coil supply, and the DQ542MA DIP-switch (microstep/current) settings.

connectors:
  MEGA:
    type: Arduino Mega 2560
    pinlabels: [D5, D7, D6, D8, D10, D9, D3, D2, D12, D23, D25, D27, D29, D31, D33, 5V, GND]

  PSU:
    type: Mean-Well-style SMPS S-360-24
    pinlabels: [V+, V-]
    notes: AC 110/220 V in; DC out 24 V / 15 A (360 W). Feeds both driver DC buses.

  XDRV:
    type: Stepper driver — X / horizontal (Wantai DQ542MA)
    pinlabels: [PUL+, PUL-, DIR+, DIR-, ENBL+, ENBL-, DC+, DC-, A+, A-, B+, B-]
    notes: >-
      18-50 VDC. Signal side common-anode: PUL+/DIR+/ENBL+ jumpered together to the
      5 V wire; Mega pulls PUL-/DIR-/ENBL-. EN active-LOW; right = LOW, left = HIGH.
      [confirm jumpering; DIP microstep/current TBD]

  YDRV:
    type: Stepper driver — Y / vertical (Wantai DQ542MA)
    pinlabels: [PUL+, PUL-, DIR+, DIR-, ENBL+, ENBL-, DC+, DC-, A+, A-, B+, B-]
    notes: >-
      18-50 VDC. Common-anode as XDRV. EN active-LOW; up = LOW, down = HIGH.
      [confirm jumpering; DIP microstep/current TBD]

  MOTOR_X:
    type: NEMA stepper — X / horizontal (4-wire bipolar)
    pinlabels: [A+, A-, B+, B-]
    notes: drives the camera carriage. [model / rated current TBD; verify coil pairing]

  MOTOR_Y:
    type: NEMA stepper — Y / vertical (4-wire bipolar)
    pinlabels: [A+, A-, B+, B-]
    notes: GT2 belt drive. [model / rated current TBD; verify coil pairing]

  PIX_H:
    type: Photointerrupter — horizontal home
    pinlabels: [VCC, GND, OUT]
    notes: INPUT_PULLUP; OUT reads LOW when the slot is blocked

  PIX_V:
    type: Photointerrupter — vertical home
    pinlabels: [VCC, GND, OUT]
    notes: INPUT_PULLUP; OUT reads LOW when the slot is blocked

  CAM:
    type: Camera trigger input (FLIR)
    pinlabels: [TRIG, GND]
    notes: ~50 ms HIGH pulse fires capture (shorter is ignored)

  RELAYS:
    type: 6-ch relay board — shelf lights
    pinlabels: [IN1, IN2, IN3, IN4, IN5, IN6, VCC, GND]
    notes: active-LOW; IN1 = shelf 1 … IN6 = shelf 6. Coil supply (JD-VCC) external — see TODO.

cables:
  WSX:                       # X signals (common-anode): 5V to anode rail + 3 signals
    colors: [RD, OG, YE, WH]
  WSY:
    colors: [RD, OG, YE, WH]
  WPX:                       # X driver DC bus from PSU
    colors: [RD, BK]
  WPY:
    colors: [RD, BK]
  WMX:                       # X motor coils (colors approximate — verify pairing)
    colors: [RD, BU, GN, YE]
  WMY:
    colors: [RD, BU, GN, YE]
  WPH:
    colors: [RD, BK, WH]
  WPV:
    colors: [RD, BK, WH]
  WCAM:
    colors: [VT, BK]
  WREL:
    colors: [BN, RD, OG, YE, GN, BU, WH, BK]

connections:
  -                                   # X stepper signals (common-anode)
    - MEGA: [5V, D5, D7, D6]
    - WSX: [1, 2, 3, 4]
    - XDRV: [PUL+, PUL-, DIR-, ENBL-]
  -                                   # Y stepper signals (common-anode)
    - MEGA: [5V, D8, D10, D9]
    - WSY: [1, 2, 3, 4]
    - YDRV: [PUL+, PUL-, DIR-, ENBL-]
  -                                   # X driver power (24 V bus)
    - PSU: [V+, V-]
    - WPX: [1, 2]
    - XDRV: [DC+, DC-]
  -                                   # Y driver power (24 V bus)
    - PSU: [V+, V-]
    - WPY: [1, 2]
    - YDRV: [DC+, DC-]
  -                                   # X motor coils
    - XDRV: [A+, A-, B+, B-]
    - WMX: [1, 2, 3, 4]
    - MOTOR_X: [A+, A-, B+, B-]
  -                                   # Y motor coils
    - YDRV: [A+, A-, B+, B-]
    - WMY: [1, 2, 3, 4]
    - MOTOR_Y: [A+, A-, B+, B-]
  -                                   # horizontal home photointerrupter
    - MEGA: [5V, GND, D3]
    - WPH: [1, 2, 3]
    - PIX_H: [VCC, GND, OUT]
  -                                   # vertical home photointerrupter
    - MEGA: [5V, GND, D2]
    - WPV: [1, 2, 3]
    - PIX_V: [VCC, GND, OUT]
  -                                   # camera trigger
    - MEGA: [D12, GND]
    - WCAM: [1, 2]
    - CAM: [TRIG, GND]
  -                                   # shelf-light relays
    - MEGA: [D23, D25, D27, D29, D31, D33, 5V, GND]
    - WREL: [1, 2, 3, 4, 5, 6, 7, 8]
    - RELAYS: [IN1, IN2, IN3, IN4, IN5, IN6, VCC, GND]

# On the DQ542MA common-anode signal side, PUL+/DIR+/ENBL+ are jumpered to the single
# 5 V wire (WSX/WSY pin 1); the Mega pins land on PUL-/DIR-/ENBL-. See the open-questions
# list (wiki) for the remaining unknowns: DIP settings, motor specs, 5 V source.
