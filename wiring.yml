# WireViz source for the example GROOT robot's control wiring.
#
# Render:  pip install wireviz   (also needs Graphviz `dot` on PATH)
#          wireviz wiring.yml     ->  wiring.svg + wiring.png + wiring.bom.tsv
# Commit the generated wiring.svg next to this file so it renders on GitHub.
#
# SCOPE: the Arduino control-signal wiring, taken straight from the firmware pin
# map (robot-control). POWER distribution — motor PSU -> driver VMOT/GND, the 5 V
# logic source, and the relay coil supply (JD-VCC) — is build-specific and is left
# as TODO below; fill it in with the actual supply used on this rig.

connectors:
  MEGA:
    type: Arduino Mega 2560
    pinlabels: [D5, D7, D6, D8, D10, D9, D3, D2, D12, D23, D25, D27, D29, D31, D33, 5V, GND]

  XDRV:
    type: Stepper driver — X / horizontal
    pinlabels: [STEP, DIR, EN]
    notes: EN active-LOW; right = LOW, left = HIGH

  YDRV:
    type: Stepper driver — Y / vertical
    pinlabels: [STEP, DIR, EN]
    notes: EN active-LOW; up = LOW, down = HIGH

  PIX_H:
    type: Photointerrupter — horizontal home
    pinlabels: [VCC, GND, OUT]
    notes: INPUT_PULLUP; OUT reads LOW when the slot is blocked

  PIX_V:
    type: Photointerrupter — vertical home
    pinlabels: [VCC, GND, OUT]
    notes: INPUT_PULLUP; OUT reads LOW when the slot is blocked

  CAM:
    type: Camera trigger input
    pinlabels: [TRIG, GND]
    notes: ~50 ms HIGH pulse fires capture (shorter is ignored)

  RELAYS:
    type: 6-ch relay board — shelf lights
    pinlabels: [IN1, IN2, IN3, IN4, IN5, IN6, VCC, GND]
    notes: active-LOW; IN1 = shelf 1 … IN6 = shelf 6. Coil supply (JD-VCC) external — see TODO.

cables:
  WX:
    colors: [GN, YE, OG]
  WY:
    colors: [GN, YE, OG]
  WPH:
    colors: [RD, BK, WH]
  WPV:
    colors: [RD, BK, WH]
  WCAM:
    colors: [VT, BK]
  WREL:
    colors: [BN, RD, OG, YE, GN, BU, WH, BK]

connections:
  -                                   # X stepper control
    - MEGA: [D5, D7, D6]
    - WX: [1, 2, 3]
    - XDRV: [STEP, DIR, EN]
  -                                   # Y stepper control
    - MEGA: [D8, D10, D9]
    - WY: [1, 2, 3]
    - YDRV: [STEP, DIR, EN]
  -                                   # horizontal home photointerrupter
    - MEGA: [5V, GND, D3]
    - WPH: [1, 2, 3]
    - PIX_H: [VCC, GND, OUT]
  -                                   # vertical home photointerrupter
    - MEGA: [5V, GND, D2]
    - WPV: [1, 2, 3]
    - PIX_V: [VCC, GND, OUT]
  -                                   # camera trigger
    - MEGA: [D12, GND]
    - WCAM: [1, 2]
    - CAM: [TRIG, GND]
  -                                   # shelf-light relays
    - MEGA: [D23, D25, D27, D29, D31, D33, 5V, GND]
    - WREL: [1, 2, 3, 4, 5, 6, 7, 8]
    - RELAYS: [IN1, IN2, IN3, IN4, IN5, IN6, VCC, GND]

# TODO (power, build-specific — not in the firmware pin map):
#   - Motor PSU (+V, GND) -> XDRV/YDRV VMOT, GND  (driver-dependent, e.g. A4988/DRV8825)
#   - 5 V logic source for MEGA / sensors / relay logic side
#   - Relay coil supply (JD-VCC) and its GND; remove the VCC-from-MEGA link above if the
#     board's logic side is powered separately.
