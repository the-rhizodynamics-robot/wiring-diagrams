# WireViz source for the example GROOT robot's wiring.
#
# Render:  pip install wireviz   (also needs Graphviz `dot` on PATH)
#          wireviz wiring.yml     ->  wiring.svg + wiring.png + wiring.bom.tsv
# Commit the generated wiring.svg next to this file so it renders on GitHub.
#
# SCOPE: the Arduino control signals (from the firmware pin map) PLUS the stepper
# power subsystem (24 V PSU -> DQ542MA drivers -> motors), documented from photos of
# the rig. Still TODO: the 5 V logic source for the Mega/sensors/relay logic and the
# relay coil supply.
#
# Verified against robot-control firmware (robot_device_serial.ino): pins D5/D7/D6 (X)
# and D8/D10/D9 (Y) match; the common-cathode wiring realizes the firmware's active-LOW
# enable (D6/D9 LOW -> ENA opto off -> driver enabled).

connectors:
  MEGA:
    type: Arduino Mega 2560
    pinlabels: [D5, D7, D6, D8, D10, D9, D3, D2, D12, D23, D25, D27, D29, D31, D33, 5V, GND]

  PSU:
    type: Mean-Well-style SMPS S-360-24
    pinlabels: [V+, V-]
    notes: AC 110/220 V in; DC out 24 V / 15 A (360 W). Feeds both driver DC buses.

  XDRV:
    type: Stepper driver — X / horizontal (Wantai DQ542MA)
    pinlabels: [PUL+, PUL-, DIR+, DIR-, ENBL+, ENBL-, DC+, DC-, A+, A-, B+, B-]
    notes: >-
      18-50 VDC. Common-cathode signal: Mega D5/D7/D6 drive PUL+/DIR+/ENBL+;
      PUL-/DIR-/ENBL- jumpered to Mega GND. DIP SW1-8 = ON OFF ON OFF ON OFF OFF ON:
      128 microstep (25600 pulse/rev), 1.92 A peak / 1.36 A RMS, SW4 OFF = half
      current at standstill. EN active-LOW (firmware).

  YDRV:
    type: Stepper driver — Y / vertical (Wantai DQ542MA)
    pinlabels: [PUL+, PUL-, DIR+, DIR-, ENBL+, ENBL-, DC+, DC-, A+, A-, B+, B-]
    notes: >-
      18-50 VDC. Common-cathode signal: Mega D8/D10/D9 drive PUL+/DIR+/ENBL+;
      PUL-/DIR-/ENBL- jumpered to Mega GND. DIP SW1-8 = ON OFF OFF OFF ON OFF OFF ON:
      128 microstep (25600 pulse/rev), 3.76 A peak / 2.69 A RMS, SW4 OFF = half
      current. Higher current because it drives TWO motors in parallel (~1.88 A
      each). EN active-LOW (firmware).

  MOTOR_X:
    type: NEMA 17 stepper — X / horizontal
    pinlabels: [A+, A-, B+, B-]
    notes: >-
      StepperOnline NEMA 17, 2.0 A/phase, 59 Ncm (84 oz-in), 48 mm, 4-lead
      (17HS19-2004S1). Coil A = A+ black / A- green; coil B = B+ red / B- blue.
      Drives the camera carriage. (+/- order only affects direction.)

  MOTOR_Y1:
    type: NEMA 17 stepper — Y / vertical (1 of 2)
    pinlabels: [A+, A-, B+, B-]
    notes: >-
      StepperOnline NEMA 17 2.0 A/phase (17HS19-2004S1), GT2 belt. Coil A =
      A+ black / A- green; coil B = B+ red / B- blue.

  MOTOR_Y2:
    type: NEMA 17 stepper — Y / vertical (2 of 2)
    pinlabels: [A+, A-, B+, B-]
    notes: >-
      Second vertical motor, wired in PARALLEL with Y1 on the YDRV outputs (both
      step together; that's why YDRV current is set ~2x). Same NEMA 17 / colors.

  PIX_H:
    type: Photointerrupter — horizontal home
    pinlabels: [VCC, GND, OUT]
    notes: INPUT_PULLUP; OUT reads LOW when the slot is blocked

  PIX_V:
    type: Photointerrupter — vertical home
    pinlabels: [VCC, GND, OUT]
    notes: INPUT_PULLUP; OUT reads LOW when the slot is blocked

  CAM:
    type: Camera trigger input (FLIR)
    pinlabels: [TRIG, GND]
    notes: ~50 ms HIGH pulse fires capture (shorter is ignored)

  RELAYS:
    type: 6-ch relay board — shelf lights
    pinlabels: [IN1, IN2, IN3, IN4, IN5, IN6, VCC, GND]
    notes: active-LOW; IN1 = shelf 1 … IN6 = shelf 6. Coil supply (JD-VCC) external — see TODO.

cables:
  WSX:                       # X signals (common-cathode): 3 signals + GND return
    colors: [GN, YE, OG, BK]
  WSY:
    colors: [GN, YE, OG, BK]
  WPX:                       # X driver DC bus from PSU
    colors: [RD, BK]
  WPY:
    colors: [RD, BK]
  WMX:                       # X motor coils (StepperOnline color code)
    colors: [BK, GN, RD, BU]
  WMY1:                      # Y motor 1 coils
    colors: [BK, GN, RD, BU]
  WMY2:                      # Y motor 2 coils (parallel)
    colors: [BK, GN, RD, BU]
  WPH:
    colors: [RD, BK, WH]
  WPV:
    colors: [RD, BK, WH]
  WCAM:
    colors: [VT, BK]
  WREL:
    colors: [BN, RD, OG, YE, GN, BU, WH, BK]

connections:
  -                                   # X stepper signals (common-cathode)
    - MEGA: [D5, D7, D6, GND]
    - WSX: [1, 2, 3, 4]
    - XDRV: [PUL+, DIR+, ENBL+, ENBL-]
  -                                   # Y stepper signals (common-cathode)
    - MEGA: [D8, D10, D9, GND]
    - WSY: [1, 2, 3, 4]
    - YDRV: [PUL+, DIR+, ENBL+, ENBL-]
  -                                   # X driver power (24 V bus)
    - PSU: [V+, V-]
    - WPX: [1, 2]
    - XDRV: [DC+, DC-]
  -                                   # Y driver power (24 V bus)
    - PSU: [V+, V-]
    - WPY: [1, 2]
    - YDRV: [DC+, DC-]
  -                                   # X motor coils
    - XDRV: [A+, A-, B+, B-]
    - WMX: [1, 2, 3, 4]
    - MOTOR_X: [A+, A-, B+, B-]
  -                                   # Y motor 1 coils
    - YDRV: [A+, A-, B+, B-]
    - WMY1: [1, 2, 3, 4]
    - MOTOR_Y1: [A+, A-, B+, B-]
  -                                   # Y motor 2 coils (parallel with motor 1)
    - YDRV: [A+, A-, B+, B-]
    - WMY2: [1, 2, 3, 4]
    - MOTOR_Y2: [A+, A-, B+, B-]
  -                                   # horizontal home photointerrupter
    - MEGA: [5V, GND, D3]
    - WPH: [1, 2, 3]
    - PIX_H: [VCC, GND, OUT]
  -                                   # vertical home photointerrupter
    - MEGA: [5V, GND, D2]
    - WPV: [1, 2, 3]
    - PIX_V: [VCC, GND, OUT]
  -                                   # camera trigger
    - MEGA: [D12, GND]
    - WCAM: [1, 2]
    - CAM: [TRIG, GND]
  -                                   # shelf-light relays
    - MEGA: [D23, D25, D27, D29, D31, D33, 5V, GND]
    - WREL: [1, 2, 3, 4, 5, 6, 7, 8]
    - RELAYS: [IN1, IN2, IN3, IN4, IN5, IN6, VCC, GND]

# DQ542MA signal side is common-cathode: the Mega's 5 V step/dir/enable outputs drive
# the PUL+/DIR+/ENBL+ inputs, and PUL-/DIR-/ENBL- are jumpered to the Mega GND wire
# (WSX/WSY pin 4). DIP: both axes 128 microstep (25600 pulse/rev), SW4 OFF = half
# current at standstill; current X = 1.92 A peak (1.36 RMS), Y = 3.76 A peak (2.69 RMS,
# split across the two parallel vertical motors).
